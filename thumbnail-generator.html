<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #111116;
    --bg2: #16161c;
    --bg3: #1c1c24;
    --text: #e8e6e1;
    --text2: #9e9a91;
    --text3: #6b6860;
    --border: #252530;
    --accent: #c8c2b4;
    --accent-dim: #847f73;
    --gold: #c9a84c;
    --gold-dim: #8a7234;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text3);
    font-size: 0.82rem;
    margin-bottom: 40px;
  }

  .controls {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label {
    font-size: 0.78rem;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 400;
  }

  input[type="number"] {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    width: 72px;
    font-size: 0.85rem;
    border-radius: 2px;
    font-family: inherit;
  }
  input[type="number"]:focus { outline: 1px solid var(--gold-dim); border-color: var(--gold-dim); }

  select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-size: 0.85rem;
    border-radius: 2px;
    font-family: inherit;
  }

  .dropzone {
    width: 100%;
    max-width: 600px;
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 60px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 28px;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--gold-dim);
    background: rgba(201, 168, 76, 0.03);
  }

  .dropzone-text {
    font-size: 0.95rem;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .dropzone-hint {
    font-size: 0.75rem;
    color: var(--text3);
  }

  .file-input { display: none; }

  .status {
    font-size: 0.82rem;
    color: var(--text2);
    margin-bottom: 12px;
    min-height: 1.4em;
  }

  .progress-bar-track {
    width: 100%;
    max-width: 600px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 28px;
    display: none;
  }
  .progress-bar-track.active { display: block; }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--gold);
    transition: width 0.15s ease;
  }

  .download-btn {
    display: none;
    padding: 12px 32px;
    background: var(--gold-dim);
    color: var(--text);
    border: none;
    font-size: 0.88rem;
    font-family: inherit;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .download-btn:hover { background: var(--gold); color: var(--bg); }
  .download-btn.visible { display: inline-block; }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    width: 100%;
    max-width: 600px;
    margin-top: 28px;
  }
  .preview-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 2px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<h1>Thumbnail Generator</h1>
<p class="subtitle">Drop images in, get a zip of resized thumbnails out. Runs entirely in your browser.</p>

<div class="controls">
  <div class="control-group">
    <label for="maxWidth">Max width</label>
    <input type="number" id="maxWidth" value="300" min="50" max="1200">
    <label style="text-transform: none;">px</label>
  </div>
  <div class="control-group">
    <label for="quality">Quality</label>
    <input type="number" id="quality" value="70" min="10" max="100">
    <label style="text-transform: none;">%</label>
  </div>
  <div class="control-group">
    <label for="format">Format</label>
    <select id="format">
      <option value="image/jpeg" selected>JPEG</option>
      <option value="image/webp">WebP</option>
      <option value="image/png">PNG</option>
    </select>
  </div>
</div>

<div class="dropzone" id="dropzone">
  <div class="dropzone-text">Drop image files here — or click to browse</div>
  <div class="dropzone-hint">JPG, PNG, WebP accepted &middot; handles hundreds of files</div>
</div>

<input type="file" class="file-input" id="fileInput" accept="image/*" multiple>

<p class="status" id="status"></p>

<div class="progress-bar-track" id="progressTrack">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>

<button class="download-btn" id="downloadBtn">Download Thumbnails (.zip)</button>

<div class="preview-grid" id="previewGrid"></div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const progressTrack = document.getElementById('progressTrack');
const progressFill = document.getElementById('progressFill');
const downloadBtn = document.getElementById('downloadBtn');
const previewGrid = document.getElementById('previewGrid');

let zipBlob = null;

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  if (!files.length) { status.textContent = 'No image files found.'; return; }

  const maxW = parseInt(document.getElementById('maxWidth').value) || 300;
  const qual = (parseInt(document.getElementById('quality').value) || 70) / 100;
  const fmt = document.getElementById('format').value;
  const ext = fmt === 'image/webp' ? '.webp' : fmt === 'image/png' ? '.png' : '.jpg';

  status.textContent = `Processing 0 / ${files.length}…`;
  progressTrack.classList.add('active');
  progressFill.style.width = '0%';
  downloadBtn.classList.remove('visible');
  previewGrid.innerHTML = '';
  zipBlob = null;

  const zip = new JSZip();
  const thumbsFolder = zip.folder('thumbs');

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const blob = await resizeImage(file, maxW, qual, fmt);
      const baseName = file.name.replace(/\.[^.]+$/, '') + ext;
      thumbsFolder.file(baseName, blob);

      // Small preview
      const url = URL.createObjectURL(blob);
      const img = document.createElement('img');
      img.src = url;
      previewGrid.appendChild(img);
    } catch (err) {
      console.warn('Skipped', file.name, err);
    }

    const pct = Math.round(((i + 1) / files.length) * 100);
    progressFill.style.width = pct + '%';
    status.textContent = `Processing ${i + 1} / ${files.length}…`;

    // Yield to browser to keep UI responsive
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  status.textContent = `Done — ${files.length} thumbnails generated. Building zip…`;

  zipBlob = await zip.generateAsync({ type: 'blob' });
  const sizeMB = (zipBlob.size / (1024 * 1024)).toFixed(1);
  status.textContent = `Ready — ${files.length} thumbnails (${sizeMB} MB zip)`;
  downloadBtn.classList.add('visible');
}

function resizeImage(file, maxW, quality, format) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      // Center-crop to square
      const side = Math.min(img.width, img.height);
      const sx = Math.round((img.width - side) / 2);
      const sy = Math.round((img.height - side) / 2);
      const out = Math.min(side, maxW);
      const canvas = document.createElement('canvas');
      canvas.width = out;
      canvas.height = out;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, out, out);
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('Canvas toBlob failed'));
      }, format, quality);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => reject(new Error('Failed to load ' + file.name));
    img.src = URL.createObjectURL(file);
  });
}

downloadBtn.addEventListener('click', () => {
  if (!zipBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'thumbs.zip';
  a.click();
  URL.revokeObjectURL(a.href);
});
</script>

</body>
</html>
